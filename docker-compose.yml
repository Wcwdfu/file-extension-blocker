services:
  mysql:
    image: mysql:8
    container_name: extension-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: extensiondb
      MYSQL_USER: app
      MYSQL_PASSWORD: app1234
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30

  app:
    build: .
    container_name: extension-app
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/extensiondb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      DB_USERNAME: app
      DB_PASSWORD: app1234
    restart: unless-stopped

volumes:
  mysql-data: